seed: 1337
model:
  name: bert-base-uncased
  latent_dim: 256
data:
  dataset: wikitext
  subset: wikitext-103-raw-v1
  train_size: 1000000
  max_seq_len: 64
training:
  epochs: 3
  batch_size: 128
  lr: 0.0001
  checkpoint: stage1_best.pt
latent_noise:
  enabled: true
  std_frac: 0.05
  warmup_frac: 0.10
  min_mult: 0.25
